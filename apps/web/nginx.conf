# Gustale Web — nginx config
#
# Serves the Astro static build on port 4001.
# Upstream Caddy terminates TLS and forwards here.

server {
    listen 4001;
    listen [::]:4001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (mirror Caddy's per-host config so the policy is
    # consistent whether the request hits Caddy directly or skips it)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hashed asset bundles get a long cache; everything else is revalidated.
    location /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Favicons / static public files — moderate cache
    location ~* ^/(favicon\.(svg|ico|png|webp)|robots\.txt|sitemap.*\.xml|.*\.(png|jpg|jpeg|webp|svg|ico|woff2?))$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # HTML pages — never cache (Astro emits per-request content; API data
    # can be inside the SSR'd HTML)
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        # SPA-style fallback: /dishes/<slug> → /dishes/index.html, etc.
        try_files $uri $uri/ $uri.html /index.html;
    }

    # gzip on text-ish content (Caddy already encodes, but defense in depth)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
