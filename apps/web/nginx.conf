# Gustale Web — nginx config
#
# Serves the Astro static build on port 4001.
# Upstream Caddy terminates TLS and forwards here.

server {
    listen 4001;
    listen [::]:4001;
    server_name _;

    # We're behind Caddy, which terminates TLS and forwards on :4001.
    # Without these two directives, nginx's auto-redirect (e.g. /dishes
    # → /dishes/) generates a Location URL that includes ":4001" because
    # the listen port is non-standard. That breaks the user experience:
    # their browser follows a redirect to gustale.com:4001/... which
    # is a wrong port and wrong scheme (http://).
    #
    # absolute_redirect off  → use relative Location: /dishes/
    # port_in_redirect off   → even if absolute, omit the port
    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (mirror Caddy's per-host config so the policy is
    # consistent whether the request hits Caddy directly or skips it)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hashed asset bundles get a long cache; everything else is revalidated.
    location /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Favicons / static public files — moderate cache
    location ~* ^/(favicon\.(svg|ico|png|webp)|robots\.txt|sitemap.*\.xml|.*\.(png|jpg|jpeg|webp|svg|ico|woff2?))$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # HTML pages — never cache (Astro emits per-request content; API data
    # can be inside the SSR'd HTML)
    location / {
        add_header Cache-Control "no-cache, must-revalidate";

        # Special-case: the geo domain has /dishes/<slug>/index.html but
        # deliberately no /dishes/index.html (the recipes list page is
        # only on gustale.recipes). Even with `try_files $uri/index.html`
        # below, nginx's `index` directive processes the trailing-slash
        # directory request and tries to serve /dishes/index.html —
        # which doesn't exist. nginx's autoindex then 403s.
        #
        # Intercept the bare /dishes/ request explicitly and return 404.
        # This is geo-only behaviour; on gustale.recipes this block is
        # never hit because /dishes/index.html exists.
        #
        # `if` inside `location` is generally a code smell in nginx, but
        # for this one-off redirect it's the cleanest option. The check
        # runs before the try_files chain so the 404 fires immediately.
        if ($uri = "/dishes/") {
            return 404;
        }

        # Try: exact file → dir/index.html → /404.html.
        #
        # The explicit `$uri/index.html` (instead of `$uri/`) is critical
        # for the domain-split geo build: after post-build.mjs removes
        # dist/dishes/index.html, the dir still exists (with all
        # dist/dishes/<slug>/index.html files in it).
        #
        # With `try_files $uri $uri/ ...`, nginx treats `$uri/` as a
        # directory and tries its autoindex. If the dir has no index.html,
        # nginx returns 403 "autoindex forbidden" — visible as
        # 403 on gustale.com/dishes/. Using `$uri/index.html` instead
        # is an explicit file check: if it doesn't exist, the next
        # try_file runs, eventually returning 404.
        #
        # The /404.html fallback ensures unknown slugs get a proper 404
        # response rather than 200 OK with the home page (which kills SEO).
        try_files $uri $uri/index.html /404.html;
    }

    # The 404 page itself should return a 404 status.
    # The `error_page` directive below handles non-existent files, but the
    # `try_files` chain above routes here only as a last resort, so we
    # need to set the status explicitly.
    location = /404.html {
        add_header Cache-Control "no-cache, must-revalidate";
        return 404;
    }

    # gzip on text-ish content (Caddy already encodes, but defense in depth)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
